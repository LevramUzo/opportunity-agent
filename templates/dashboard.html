<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Opportunity Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .nav h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
        }
        .nav-links a:hover {
            color: #60a5fa;
        }
        .welcome {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .welcome h2 {
            color: #f1f5f9;
            margin-bottom: 10px;
        }
        .welcome p {
            color: #94a3b8;
        }
        .profile-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .profile-card h3 {
            color: #60a5fa;
            margin-bottom: 15px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .profile-item {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
        }
        .profile-item label {
            display: block;
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .profile-item span {
            color: #e2e8f0;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .action-btn {
            display: block;
            padding: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #e2e8f0;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .action-btn:hover {
            border-color: #60a5fa;
            transform: translateY(-2px);
        }
        .action-btn .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <h1>🎯 Opportunity Intelligence</h1>
            <div class="nav-links">
                <a href="/saved">📚 Saved</a>
                <a href="/logout">Log Out</a>
            </div>
        </div>

        <div class="welcome">
            <h2>Welcome back, {{ user.name }}!</h2>
            <p>Your personalized opportunity finder is ready.</p>
        </div>

        <div class="profile-card">
            <h3>👤 Your Profile</h3>
            <div class="profile-grid">
                <div class="profile-item">
                    <label>Nationality</label>
                    <span>{{ user.nationality }}</span>
                </div>
                <div class="profile-item">
                    <label>Education</label>
                    <span>{{ user.education }}</span>
                </div>
                <div class="profile-item">
                    <label>Field</label>
                    <span>{{ user.field }}</span>
                </div>
                <div class="profile-item">
                    <label>Status</label>
                    <span>{{ user.status }}</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <form action="/search" method="post">
                <button type="submit" class="action-btn primary">
                    <div class="icon">🔍</div>
                    <div>Search for Opportunities</div>
                </button>
            </form>
            <a href="/saved" class="action-btn">
                <div class="icon">📚</div>
                <div>View Saved Opportunities</div>
            </a>
        </div>
    </div>
</body>
</html>
