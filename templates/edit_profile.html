<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Opportunity Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Edit Your Profile</h1>
        </div>
        <div class="form-card">
            <form action="/edit-profile" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" value="{{ user.name }}" required>
                </div>
                <div class="form-group">
                    <label>Nationality</label>
                    <input type="text" name="nationality" value="{{ user.nationality }}" required>
                </div>
                <div class="form-group">
                    <label>Education</label>
                    <input type="text" name="education" value="{{ user.education }}" required>
                </div>
                <div class="form-group">
                    <label>Field</label>
                    <input type="text" name="field" value="{{ user.field }}" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="NYSC" {% if user.status == 'NYSC' %}selected{% endif %}>NYSC</option>
                        <option value="Graduate" {% if user.status == 'Graduate' %}selected{% endif %}>Graduate</option>
                        <option value="Student" {% if user.status == 'Student' %}selected{% endif %}>Student</option>
                        <option value="Professional" {% if user.status == 'Professional' %}selected{% endif %}>Professional</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Update Profile</button>
            </form>
            <div class="back-link">
                <a href="/">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
