{% extends "base.html" %}

{% block title %}Edit Profile - Opportunity Intelligence{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <div class="card animate-slide-up">
        <h2 style="font-size: 1.5rem; margin-bottom: 24px;" class="text-gradient">Edit Profile</h2>
        
        <form action="/edit-profile" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>
            <div class="form-group">
                <label>Nationality</label>
                <select name="nationality" required>
                    <option value="{{ user.nationality }}" selected>{{ user.nationality }}</option>
                    <option value="Nigeria">Nigeria</option>
                    <option value="Kenya">Kenya</option>
                    <option value="Ghana">Ghana</option>
                    <option value="South Africa">South Africa</option>
                    <option value="Ethiopia">Ethiopia</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Education Level</label>
                <select name="education" required>
                    <option value="{{ user.education }}" selected>{{ user.education }}</option>
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Graduate">Graduate</option>
                    <option value="PhD">PhD</option>
                    <option value="Postdoc">Postdoc</option>
                </select>
            </div>
            <div class="form-group">
                <label>Field of Study</label>
                <input type="text" name="field" value="{{ user.field }}" required>
            </div>
            <div class="form-group">
                <label>Current Status</label>
                <select name="status" required>
                    <option value="{{ user.status }}" selected>{{ user.status }}</option>
                    <option value="Student">Student</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Working Professional">Working Professional</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
