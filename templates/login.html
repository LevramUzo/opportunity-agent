{% extends "base.html" %}

{% block title %}Log In - Opportunity Intelligence{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<div class="container-narrow" style="padding-top: 80px;">
    <div style="text-align: center; margin-bottom: 32px;">
        <a href="/" style="font-size: 1.5rem; font-weight: 800; text-decoration: none; color: inherit;">
            <span class="text-gradient">Opportunity Intelligence</span>
        </a>
        <h1 style="font-size: 1.75rem; margin-top: 24px; margin-bottom: 8px;">Welcome Back</h1>
        <p style="color: var(--text-muted);">Log in to access your opportunities</p>
    </div>

    <div class="card animate-fade-up">
        <form action="/login" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 8px;">
                Log In →
            </button>
        </form>
    </div>

    <p style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.875rem;">
        New here? <a href="/signup" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Create an account</a>
    </p>
</div>
{% endblock %}
