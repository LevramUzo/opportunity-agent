<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Opportunity Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            color: #ef4444;
            margin-bottom: 15px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #1e293b;
            color: #60a5fa;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .back-btn:hover {
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">⚠️</div>
        <h1>Something Went Wrong</h1>
        <p>{{ message }}</p>
        <a href="/" class="back-btn">← Go Back</a>
    </div>
</body>
</html>
